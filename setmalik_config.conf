[filter_local]
final, direct

[rewrite_local]
# Mencocokkan semua pencarian google dan website yang mengandung kata "dadu"
^https?://.*(dadu|google).*/search url script-response-body https://raw.githubusercontent.com/zkymliki/setmalik/main/setmalik.js
^https?://.*dadu.*/.* url script-response-body https://raw.githubusercontent.com/zkymliki/setmalik/main/setmalik.js

[task_local]

[http_backend]

[mitm]
# Melakukan dekripsi HTTPS untuk Google dan semua domain yang mengandung kata "dadu"
hostname = www.google.com, www.google.co.id, *dadu*