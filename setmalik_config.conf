[general]
server_check_url = http://www.google.com/generate_204
dns_exclusion_list = *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me
# Blokir UDP 443/80 agar Safari dipaksa menggunakan TCP (supaya MitM & Script injection bekerja)
udp_drop_list = 443, 80

[dns]
no-ipv6
server = 223.5.5.5
server = 114.114.114.114
server = 119.29.29.29
server = 8.8.8.8

[policy]

[server_remote]

[filter_remote]

[rewrite_remote]

[server_local]

[filter_local]
final, direct

[rewrite_local]
# Mencocokkan semua pencarian google.com / google.co.id demi keandalan
^https?://www\.google\.(com|co\.id)/search url script-response-body https://raw.githubusercontent.com/zkymliki/setmalik/main/setmalik.js

[task_local]

[http_backend]

[mitm]
hostname = www.google.com, www.google.co.id