[general]
server_check_url = http://www.google.com/generate_204
dns_exclusion_list = *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me
resource_parser_url = https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js

[dns]
no-ipv6
server = 223.5.5.5
server = 114.114.114.114
server = 119.29.29.29
server = 8.8.8.8

[policy]

[server_remote]

[filter_remote]
FILTER_REGION, tag=CN, force-policy=direct, inserted-resource=true, enabled=true
FILTER_LAN, tag=LAN, force-policy=direct, inserted-resource=true, enabled=true

[rewrite_remote]

[server_local]

[filter_local]
final, proxy

[rewrite_local]
# Rule 1: Intercept pencarian "dadu" / "dadu online" / "dice" di Google
^https?:\/\/www\.google\.co\.id\/search\?.*(dadu|dice).* url script-response-body https://raw.githubusercontent.com/zkymliki/setmalik/main/setmalik.js
^https?:\/\/www\.google\.com\/search\?.*(dadu|dice).* url script-response-body https://raw.githubusercontent.com/zkymliki/setmalik/main/setmalik.js

# Rule 2: API proxy - ambil target dari Firebase
^https?:\/\/www\.google\.(com|co\.id)\/dice-ctrl\/get url script-request-body https://raw.githubusercontent.com/zkymliki/setmalik/main/setmalik.js

# Rule 3: API proxy - reset target di Firebase
^https?:\/\/www\.google\.(com|co\.id)\/dice-ctrl\/reset url script-request-body https://raw.githubusercontent.com/zkymliki/setmalik/main/setmalik.js

[task_local]

[http_backend]

[mitm]
# ============================================================
#   PENTING:
#   1. Buka QX > Settings > MitM > Generate Certificate
#   2. Tap Install Certificate
#   3. iPhone Settings > General > VPN & Device Management > Trust
# ============================================================
hostname = www.google.com, www.google.co.id, raw.githubusercontent.com
