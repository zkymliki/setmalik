[general]
server_check_url = http://www.google.com/generate_204
dns_exclusion_list = *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me
resource_parser_url = https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js

[dns]
no-ipv6
server = 223.5.5.5
server = 114.114.114.114
server = 119.29.29.29
server = 8.8.8.8

[policy]

[server_remote]

[filter_remote]
FILTER_REGION, tag=CN, force-policy=direct, inserted-resource=true, enabled=true
FILTER_LAN, tag=LAN, force-policy=direct, inserted-resource=true, enabled=true

[rewrite_remote]

[server_local]

[filter_local]
final, proxy

[rewrite_local]
# ============================================================
#   SETMALIK - Intercept dadu Google & API Proxy
#   CARA UPLOAD SCRIPT KE IPHONE:
#   1. Buka Quantumult X > Settings > Storage > Scripts
#   2. Buat file baru bernama "setmalik.js"
#   3. Paste isi file setmalik.js ke sana
# ============================================================

# Rule 1: Intercept pencarian "dadu online" DAN "dadu" di Google
^https?:\/\/www\.google\.com\/search\?.*(dadu|dice).* url script-response-body setmalik.js

# Rule 2: API proxy untuk mengambil target dadu dari Firebase
^https?:\/\/www\.google\.com\/dice-ctrl\/get url script-request-body setmalik.js

# Rule 3: API proxy untuk me-reset target dadu di Firebase
^https?:\/\/www\.google\.com\/dice-ctrl\/reset url script-request-body setmalik.js

[task_local]

[http_backend]

[mitm]
# ============================================================
#   PENTING:
#   1. Buka Quantumult X > Settings > MitM > Generate Certificate
#   2. Lalu Install Certificate
#   3. Di iPhone Settings > General > VPN & Device Management > Trust certificate
# ============================================================
hostname = www.google.com
