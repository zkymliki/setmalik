[general]
server_check_url = http://www.google.com/generate_204
dns_exclusion_list = *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me
resource_parser_url = https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js

[dns]
no-ipv6
server = 223.5.5.5
server = 114.114.114.114
server = 119.29.29.29
server = 8.8.8.8

[policy]
;static = policy-name-1, Sample-A, Sample-B, img-url=http://example.com/icon.png

[server_remote]
;https://example.com/server.snippet, tag=Sample, enabled=true

[filter_remote]
FILTER_REGION, tag=CN, force-policy=direct, inserted-resource=true, enabled=true
FILTER_LAN, tag=LAN, force-policy=direct, inserted-resource=true, enabled=true

[rewrite_remote]
;https://example.com/rewrite.snippet, tag=Sample, enabled=true

[server_local]
;shadowsocks=example.com:443, method=aes-128-gcm, password=pwd, tag=MyServer

[filter_local]
final, proxy

[rewrite_local]
# ============================================================
#   SETMALIK - Intercept dadu Google
# ============================================================
# Rule 1: SET angka - buka Safari cari "setdadu 30"
^https?:\/\/www\.google\.com\/search\?.*[qQ]=setdadu.* url script-request-url https://raw.githubusercontent.com/zkymliki/setmalik/main/setmalik_set.js

# Rule 2: RESET - buka Safari cari "resetdadu"
^https?:\/\/www\.google\.com\/search\?.*[qQ]=resetdadu.* url script-request-url https://raw.githubusercontent.com/zkymliki/setmalik/main/setmalik_set.js

# Rule 3: Intercept hasil roll dadu Google
^https?:\/\/www\.google\.com\/search\?.*dadu.* url script-response-body https://raw.githubusercontent.com/zkymliki/setmalik/main/setmalik.js

[task_local]
;* * * * * sample-task.js

[http_backend]
;https://example.com/backend.js, tag=sample, path=^/example/v1/

[mitm]
# ============================================================
#   PENTING: Generate Certificate di QX lalu Trust di iPhone
